<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Pithadkrupa Real Estate & Investors - Real Estate in Ahmedabad | Property Dealers</title>
    <meta name="description" content="Pithadkrupa Real Estate & Investors - Trusted real estate consultants in Ahmedabad. Residential, commercial & pre-launch properties. Where Dreams Come True..." />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        z-index: 9999;
        transition: opacity 260ms ease, visibility 260ms ease;
      }
      #app-loader.loaded {
        opacity: 0;
        visibility: hidden;
      }
      #app-loader .wrap {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 20px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      #app-loader .spinner {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 3px solid rgba(15, 23, 42, 0.12);
        border-top-color: #f97316;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: dark) {
        #app-loader {
          background: #0f172a;
          color: #fff;
        }
        #app-loader .wrap {
          background: rgba(255, 255, 255, 0.06);
          border-color: rgba(255, 255, 255, 0.12);
          box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }
        #app-loader .spinner {
          border-color: rgba(255, 255, 255, 0.12);
          border-top-color: #f97316;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-label="Loading">
      <div class="wrap">
        <div class="spinner" aria-hidden="true"></div>
        <div>Loading…</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
